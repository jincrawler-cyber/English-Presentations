  { "id": 1, "type": "choice", "q": "Which quantifier is used for non-count nouns like 'rice' or 'sugar' in small amounts?", "options": ["A few", "A little", "Many", "Several"], "correct": 1 },

  { "id": 25, "type": "choice", "q": "Which word is a synonym for 'spicy' in English?", "options": ["Bitter", "Hot", "Sweet", "Raw"], "correct": 1 }
]; 

        let state = { view: 'init', user: null, mode: 'cloud', studentName: '', studentKey: '', quizData: [], qIndex: 0, score: 0, tempAnswer: null, isAnswered: false, selectedGroupingItem: null, detailedAnswers: {}, results: [], studentsList: [], db: null, auth: null, adminTab: 'results', appId: 'evolve-2-u7-u83-v1', warnings: 0, focusListenerAdded: false, firebaseError: null };

        const getColRef = (name) => collection(state.db, 'artifacts', state.appId, 'public', 'data', name);
        const getDocRef = (colName, docId) => doc(state.db, 'artifacts', state.appId, 'public', 'data', colName, docId);
        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
        function normalizeText(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
        const playAlarm = () => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(440, ctx.currentTime); gain.gain.setValueAtTime(0.6, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1); osc.start(); osc.stop(ctx.currentTime + 1); } catch(e) {} };
        function saveState() { if (state.studentKey && state.studentKey !== 'Test1973') { const savedData = { studentName: state.studentName, qIndex: state.qIndex, score: state.score, warnings: state.warnings, detailedAnswers: state.detailedAnswers, quizOrder: state.quizData.map(q => q.id), finished: state.view === 'finished', timestamp: new Date().toISOString() }; localStorage.setItem(`quiz_state_${state.studentKey.toUpperCase()}`, JSON.stringify(savedData)); } }
        function restoreState(key) { const saved = localStorage.getItem(`quiz_state_${key.toUpperCase()}`); if (saved) { const data = JSON.parse(saved); state.studentName = data.studentName || state.studentName; if (data.finished) { state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); state.view = 'finished'; return true; } else { state.qIndex = data.qIndex; state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); return false; } } return null; }
        function restoreOrder(orderIds) { let ordered = []; orderIds.forEach(id => { const q = RAW_QUIZ_DATA.find(x => x.id === id); if (q) ordered.push(q); }); return ordered; }
        window.next = () => { if (state.qIndex + 1 < state.quizData.length) { state.qIndex++; initQuestionData(state.quizData[state.qIndex]); saveState(); render(); } else { finishQuiz(); } };

        window.addEventListener('unhandledrejection', (event) => {
            console.warn("Falla capturada:", event.reason);
            const appEl = document.getElementById('app');
            if(appEl && appEl.innerHTML.includes('Cargando')) {
                state.firebaseError = "Fallo de red o permisos (" + event.reason.message + ")";
                initLocalMode();
            }
        });

        function init() { 
            try { 
                if (typeof __app_id !== 'undefined') state.appId = __app_id; 
                let c = MI_CONFIGURACION_FIREBASE; 
                if (!c && typeof __firebase_config !== 'undefined') c = JSON.parse(__firebase_config); 
                if (c) { initFirebase(c); } else { state.view = 'setup'; render(); } 
            } catch (e) { console.warn("Error en init:", e); state.view = 'setup'; render(); } 
        }
        function initFirebase(config) { 
            try { 
                const app = initializeApp(config); state.auth = getAuth(app); state.db = getFirestore(app); 
                const authPromise = (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !MI_CONFIGURACION_FIREBASE) ? signInWithCustomToken(state.auth, __initial_auth_token) : signInAnonymously(state.auth);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Tiempo de conexión a la nube agotado.")), 8000));
                Promise.race([authPromise, timeoutPromise]).then((userCred) => {
                    state.user = userCred.user; state.view = 'login'; render();
                    onAuthStateChanged(state.auth, (u) => { if (u) state.user = u; });
                }).catch((e) => { console.warn("Firebase Auth abortado. Usando Fallback Local.", e.message); state.firebaseError = e.message; initLocalMode(); });
            } catch(e) { console.warn("Firebase falló al iniciar. Usando Fallback Local.", e.message); state.firebaseError = e.message; initLocalMode(); } 
        }
        function initLocalMode() { state.mode = 'local'; state.user = { uid: 'local-' + Date.now() }; state.view = 'login'; render(); }
        function startAntiCheat() { 
            if (state.focusListenerAdded || state.studentKey === 'Test1973') return; 
            const triggerPenalty = (reason) => {
                if (state.view !== 'quiz' || state.isAnswered) return;
                playAlarm(); state.warnings++; const q = state.quizData[state.qIndex];
                state.detailedAnswers[q.id] = { type: 'cheat', val: 'ANULADA: ' + reason, correct: false }; state.isAnswered = true; 
                document.getElementById('cheat-reason').innerText = "Motivo: " + reason; document.getElementById('cheat-overlay').style.display = 'block'; saveState(); 
            };
            window.addEventListener('blur', () => { triggerPenalty("Pérdida de foco en la ventana / App externa"); });
            document.addEventListener("visibilitychange", () => { if (document.hidden) triggerPenalty("Cambio de pestaña oculto"); });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'PrintScreen' || e.code === 'PrintScreen') {
                    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText('').catch(() => { try { const el = document.createElement('textarea'); el.value = ''; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); } catch(err) {} }); } else { try { const el = document.createElement('textarea'); el.value = ''; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); } catch(err) {} }
                    triggerPenalty("Intento de Captura de Pantalla detectado");
                }
            });
            document.addEventListener('copy', (e) => { e.preventDefault(); if (e.clipboardData) e.clipboardData.setData('text/plain', 'LA COPIA NO ESTÁ PERMITIDA. ESTO QUEDARÁ REGISTRADO.'); });
            window.addEventListener('beforeunload', (e) => { if (state.view === 'quiz' && !state.isAnswered) { const q = state.quizData[state.qIndex]; state.detailedAnswers[q.id] = { type: 'cheat', val: 'ANULADA: RECARGÓ/CERRÓ LA PÁGINA', correct: false }; state.warnings++; state.qIndex++; saveState(); } });
            state.focusListenerAdded = true; 
        }
        window.dismissCheat = () => { document.getElementById('cheat-overlay').style.display = 'none'; if(window.next) window.next(); };
        async function verifyStudentKey(key) { if (key === 'Test1973') return "Usuario de Prueba"; if (state.mode === 'local') { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); if (localKeys[key.toUpperCase()]) return localKeys[key.toUpperCase()].nombre; return key === 'Test1973' ? "Alumno Prueba" : null; } try { const d = await getDoc(getDocRef('claves_alumnos', key.toUpperCase())); return d.exists() ? d.data().nombre : null; } catch(e) { return null; } }
        async function createStudentKey(key, name) { if (state.mode === 'cloud') { await setDoc(getDocRef('claves_alumnos', key.toUpperCase()), { nombre: name }); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); localKeys[key.toUpperCase()] = { nombre: name }; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        async function deleteStudentKey(key) { if (state.mode === 'cloud') { await deleteDoc(getDocRef('claves_alumnos', key)); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); delete localKeys[key]; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        function listenToData(name, cb) { if (state.mode === 'cloud') onSnapshot(query(getColRef(name)), (s) => cb(s.docs.map(d => ({ id: d.id, ...d.data() })))); }
        function initQuestionData(q) { state.isAnswered = false; state.selectedGroupingItem = null; if (q.type === 'choice' || q.type === 'reading' || q.type === 'listening') state.tempAnswer = null; if (q.type === 'text' || q.type === 'essay') state.tempAnswer = ''; if (q.type === 'matching') { const indices = q.pairs.map((_, i) => i); state.tempAnswer = { leftSelected: null, matches: {}, shuffledRight: shuffle([...indices]) }; } if (q.type === 'order') { state.tempAnswer = { pool: shuffle(q.items.map((item, i) => ({ id: i, text: item }))), answer: [] }; } if (q.type === 'fill-gap') { const regex = /{([^}]+)}/g; let parts = [], correctAnswers = [], match, lastIndex = 0; while ((match = regex.exec(q.text)) !== null) { parts.push(q.text.substring(lastIndex, match.index)); correctAnswers.push(match[1]); lastIndex = regex.lastIndex; } parts.push(q.text.substring(lastIndex)); state.tempAnswer = { userInputs: Array(correctAnswers.length).fill(''), parts, correctAnswers }; } if (q.type === 'grouping') { state.tempAnswer = shuffle(q.items.map((item, i) => ({ ...item, originalIdx: i, currentGroup: null }))); } }
        function render() { const app = document.getElementById('app'); app.innerHTML = ''; const views = { 'setup': renderSetup, 'login': renderLogin, 'quiz': renderQuiz, 'finished': renderFinished, 'admin_login': renderAdminLogin, 'admin_dashboard': renderAdminDashboard }; if (views[state.view]) views[state.view](app); }
        function renderSetup(c) { c.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-lg max-w-md text-center"><h2 class="text-xl font-bold mb-4 text-orange-600">Configuración Necesaria</h2><p class="text-sm text-slate-600 mb-6">No se detectó configuración de base de datos.</p><button onclick="window.startLocal()" class="bg-blue-100 text-blue-700 px-6 py-3 rounded-lg w-full font-bold mb-4 hover:bg-blue-200 transition">Usar Modo Local (Sin Nube)</button><div class="border-t pt-4"><label class="block text-xs font-bold text-gray-400 mb-2 uppercase text-left">O Pegar Configuración Firebase (JSON)</label><textarea id="firebaseConfigInput" rows="3" class="w-full text-xs p-2 border rounded font-mono bg-gray-50 mb-2 focus:border-indigo-500" placeholder='{ "apiKey": "..." }'></textarea><div id="setup-err" class="hidden text-red-500 text-xs mb-2"></div><button onclick="window.connectCloud()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg w-full text-sm font-bold hover:bg-indigo-700 transition">Conectar a la Nube</button></div></div>`; window.startLocal = () => initLocalMode(); window.connectCloud = async () => { try { const config = JSON.parse(document.getElementById('firebaseConfigInput').value); await initFirebase(config); } catch(e) { const errDiv = document.getElementById('setup-err'); if(errDiv) { errDiv.innerText = "Error: " + e.message; errDiv.classList.remove('hidden'); } } }; }

 { btn.dataset.confirm = 'true'; btn.innerHTML = '¿Seguro?'; btn.classList.add('bg-red-600', 'text-white'); setTimeout(() => { btn.dataset.confirm = 'false'; btn.innerHTML = '<i class="ph ph-trash"></i>'; btn.classList.remove('bg-red-600', 'text-white'); }, 3000); return; } await deleteStudentKey(id); }; window.addKey = async () => { const k=document.getElementById('nk').value, n=document.getElementById('nn').value; if(k&&n) { await createStudentKey(k,n); document.getElementById('nk').value=''; document.getElementById('nn').value=''; } }; window.openReview = (id) => { const r = state.results.find(x => x.id === id); if(!r) return; let ans = {}; try { ans = JSON.parse(r.answers || '{}'); } catch(e){} let h = `<div class="mb-6 bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex justify-between items-center"><h4 class="font-bold text-xl text-indigo-900">${r.studentName}</h4><div class="text-right"><p class="text-xs text-indigo-400 font-bold uppercase tracking-wider">Nota Actual</p><p class="font-black text-3xl text-indigo-600">${r.grade10}</p></div></div>`; RAW_QUIZ_DATA.forEach((q, i) => { const a = ans[q.id]; let s = "Sin respuesta", c = false; if (a) { c = a.correct; if(a.type==='cheat') s=`<span class="text-red-600 font-bold">${a.val}</span>`; else if (q.type === 'choice' || q.type === 'reading' || q.type==='listening') s = q.options[a.val] || "Opción inválida"; else if (q.type === 'essay' || q.type === 'text') s = a.val; else if (q.type === 'fill-gap') s = `Respuestas: ${a.val.userInputs.join(', ')}`; else s = "Completado en interactivo"; } h += `<div class="mb-4 border-b border-slate-100 pb-4"><div class="flex justify-between items-center mb-1"><p class="font-bold text-xs text-slate-400 uppercase tracking-wider">PREGUNTA ${q.id} (${q.type})</p>${c?'<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">CORRECTO</span>':'<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">INCORRECTO</span>'}</div><p class="mb-2 font-medium text-slate-800">${q.q}</p><div class="bg-slate-50 p-3 rounded-lg text-sm font-mono border-l-4 ${c?'border-green-400 text-slate-600':'border-red-400 text-red-600'}">${s}</div></div>`; }); document.getElementById('review-content').innerHTML = h; document.getElementById('review-modal').style.display = 'flex'; }; }

        init();
    </script>
