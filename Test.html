<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Quiz - Evolve 2 (U1-U2.3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .prevent-select { -webkit-user-select: none; user-select: none; }
        .prevent-select input, .prevent-select textarea { -webkit-user-select: text !important; user-select: text !important; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .match-item, .order-tag, .group-item { transition: all 0.2s; cursor: pointer; touch-action: manipulation; }
        .match-item img { max-width: 100px; max-height: 100px; object-fit: contain; display: block; margin: 0 auto; border-radius: 4px; }
        .match-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 60px; }
        .match-selected { background-color: #e0e7ff; border-color: #6366f1; transform: scale(1.02); box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); }
        .group-item-selected { background-color: #4f46e5; color: white; border-color: #4338ca; transform: scale(1.05); box-shadow: 0 4px 6px rgba(0,0,0,0.15); z-index: 50; }
        .group-target { transition: all 0.2s; border: 2px dashed #cbd5e1; }
        .group-target:active { background-color: #f1f5f9; border-color: #94a3b8; }
        .reading-text { max-height: 200px; overflow-y: auto; background: #fffbeb; border-left: 4px solid #f59e0b; padding: 1rem; margin-bottom: 1.5rem; font-style: italic; color: #4b5563; font-size: 0.95rem; line-height: 1.6; }
        .listening-banner { background: #eff6ff; border: 2px solid #bfdbfe; padding: 1rem; border-radius: 0.75rem; text-align: center; margin-bottom: 1.5rem; color: #1e40af; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        #cheat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 38, 38, 0.98); z-index: 9999; color: white; text-align: center; padding-top: 25vh; backdrop-filter: blur(10px); }
        #review-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 40; align-items: center; justify-content: center; }
        @media print { body { display: none !important; } }
    </style>
</head>
<body class="prevent-select" oncontextmenu="return false;">
    <div id="cheat-overlay">
        <i class="ph ph-warning-octagon text-7xl mb-4"></i>
        <h2 class="text-4xl font-bold mb-2">¡INFRACCIÓN DETECTADA!</h2>
        <p class="text-xl font-medium" id="cheat-reason">Has salido de la ventana del examen.</p>
        <div class="mt-6 bg-red-800 text-red-100 p-4 inline-block rounded-xl border border-red-600 shadow-inner">
            <p class="font-bold uppercase tracking-wider text-sm mb-1">Penalización Aplicada</p>
            <p class="text-lg">La pregunta actual ha sido <strong class="text-white">ANULADA</strong> (0 puntos).</p>
        </div><br>
        <button onclick="window.dismissCheat()" class="mt-8 bg-white text-red-600 px-8 py-4 rounded-full font-bold shadow-2xl hover:bg-gray-100 hover:scale-105 transition transform">Aceptar y continuar</button>
    </div>
    <div id="review-modal" class="hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl m-4 flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-xl">
                <h3 class="font-bold text-lg">Revisión Manual</h3>
                <button onclick="document.getElementById('review-modal').style.display='none'" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div id="review-content" class="p-6 overflow-y-auto flex-1"></div>
        </div>
    </div>
    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div class="text-center">
            <i class="ph ph-spinner animate-spin text-4xl text-blue-600"></i>
            <p class="mt-2 text-slate-500" id="loading-text">Cargando motor base...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, updateProfile, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, deleteDoc, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const MI_CONFIGURACION_FIREBASE = {
          apiKey: "AIzaSyAqb4tC4UrINdjgafqgKd4pIkgPCjvaqbA",
          authDomain: "english-results-f133a.firebaseapp.com",
          projectId: "english-results-f133a",
          storageBucket: "english-results-f133a.firebasestorage.app",
          messagingSenderId: "946380288618",
          appId: "1:946380288618:web:4bd2ad0d1de8e5e5f6d013"
        };
        
        const MODO_EXAMEN = true; 
        const PASSWORD_ADMIN = "PROFE123";
        const PORTADA_URL = ""; 

        const RAW_QUIZ_DATA = [
            { "id": 1, "type": "choice", "q": "My mother's sister is my...", "options": ["Aunt", "Uncle", "Cousin", "Niece"], "correct": 0 },
            { "id": 2, "type": "matching", "q": "Match the family members:", "pairs": [{"left": "Brother", "right": "Sister"}, {"left": "Husband", "right": "Wife"}, {"left": "Father", "right": "Mother"}, {"left": "Nephew", "right": "Niece"}] },
            { "id": 3, "type": "fill-gap", "q": "Complete the sentence about jobs:", "text": "A person who works in a hospital and helps doctors is a {nurse}." },
            { "id": 4, "type": "grouping", "q": "Classify the following words:", "groups": ["Family", "Jobs"], "items": [{"text": "Cousin", "group": 0}, {"text": "Architect", "group": 1}, {"text": "Grandfather", "group": 0}, {"text": "Accountant", "group": 1}, {"text": "Chef", "group": 1}, {"text": "Step-son", "group": 0}] },
            { "id": 5, "type": "order", "q": "Put the words in the correct order for an everyday activity:", "items": ["I", "usually", "check", "my", "email", "in", "the", "morning"] },
            { "id": 6, "type": "text", "q": "What do you call a person who acts in movies or plays?", "correct": "actor" },
            { "id": 7, "type": "choice", "q": "Choose the correct state verb: 'I ____ two sisters and one brother.'", "options": ["am having", "has", "have", "am"], "correct": 2 },
            { "id": 8, "type": "reading", "q": "Based on the text, what is Marco's job?", "text": "Marco is 25 years old. He works in a busy kitchen in a famous Italian restaurant. He loves cooking pasta and creating new recipes for his customers.", "options": ["He is a waiter", "He is a chef", "He is a manager", "He is a lawyer"], "correct": 1 },
            { "id": 9, "type": "essay", "q": "Describe your daily routine or a typical day at work/school. Use at least 3 frequency adverbs (always, sometimes, usually, etc.).", "keywords": ["always", "usually", "sometimes", "never", "work", "school", "home"], "minWords": 15 },
            { "id": 10, "type": "listening", "q": "Listen to the teacher (Example): Where does a receptionist work?", "options": ["In a gym", "At a front desk", "In a kitchen", "In a garage"], "correct": 1 }
        ]; 

        let state = { view: 'init', user: null, mode: 'cloud', studentName: '', studentKey: '', quizData: [], qIndex: 0, score: 0, tempAnswer: null, isAnswered: false, selectedGroupingItem: null, detailedAnswers: {}, results: [], studentsList: [], db: null, auth: null, adminTab: 'results', appId: 'mini-quiz-evolve2-u1-u23', warnings: 0, focusListenerAdded: false, firebaseError: null };

        const getColRef = (name) => collection(state.db, 'artifacts', state.appId, 'public', 'data', name);
        const getDocRef = (colName, docId) => doc(state.db, 'artifacts', state.appId, 'public', 'data', colName, docId);
        function shuffle(array) { return [...array].sort(() => Math.random() - 0.5); }
        function normalizeText(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
        const playAlarm = () => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(440, ctx.currentTime); gain.gain.setValueAtTime(0.6, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1); osc.start(); osc.stop(ctx.currentTime + 1); } catch(e) {} };
        function saveState() { if (state.studentKey && state.studentKey !== 'Test1973') { const savedData = { studentName: state.studentName, qIndex: state.qIndex, score: state.score, warnings: state.warnings, detailedAnswers: state.detailedAnswers, quizOrder: state.quizData.map(q => q.id), finished: state.view === 'finished', timestamp: new Date().toISOString() }; localStorage.setItem(`quiz_state_${state.studentKey.toUpperCase()}`, JSON.stringify(savedData)); } }
        function restoreState(key) { const saved = localStorage.getItem(`quiz_state_${key.toUpperCase()}`); if (saved) { const data = JSON.parse(saved); state.studentName = data.studentName || state.studentName; if (data.finished) { state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); state.view = 'finished'; return true; } else { state.qIndex = data.qIndex; state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); return false; } } return null; }
        function restoreOrder(orderIds) { let ordered = []; orderIds.forEach(id => { const q = RAW_QUIZ_DATA.find(x => x.id === id); if (q) ordered.push(q); }); return ordered; }
        window.next = () => { if (state.qIndex + 1 < state.quizData.length) { state.qIndex++; initQuestionData(state.quizData[state.qIndex]); saveState(); render(); } else { finishQuiz(); } };

        window.addEventListener('unhandledrejection', (event) => {
            console.warn("Falla capturada:", event.reason);
            const appEl = document.getElementById('app');
            if(appEl && appEl.innerHTML.includes('Cargando')) {
                state.firebaseError = "Fallo de red o permisos (" + event.reason.message + ")";
                initLocalMode();
            }
        });

        function init() { 
            try { 
                let c = MI_CONFIGURACION_FIREBASE; 
                if (c) { initFirebase(c); } else { state.view = 'setup'; render(); } 
            } catch (e) { console.warn("Error en init:", e); state.view = 'setup'; render(); } 
        }
        function initFirebase(config) { 
            try { 
                const app = initializeApp(config); state.auth = getAuth(app); state.db = getFirestore(app); 
                const authPromise = signInAnonymously(state.auth);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Tiempo de conexión a la nube agotado.")), 8000));
                Promise.race([authPromise, timeoutPromise]).then((userCred) => {
                    state.user = userCred.user; state.view = 'login'; render();
                    onAuthStateChanged(state.auth, (u) => { if (u) state.user = u; });
                }).catch((e) => { console.warn("Firebase Auth abortado. Usando Fallback Local.", e.message); state.firebaseError = e.message; initLocalMode(); });
            } catch(e) { console.warn("Firebase falló al iniciar. Usando Fallback Local.", e.message); state.firebaseError = e.message; initLocalMode(); } 
        }
        function initLocalMode() { state.mode = 'local'; state.user = { uid: 'local-' + Date.now() }; state.view = 'login'; render(); }
        function startAntiCheat() { 
            if (state.focusListenerAdded || state.studentKey === 'Test1973') return; 
            const triggerPenalty = (reason) => {
                if (state.view !== 'quiz' || state.isAnswered) return;
                playAlarm(); state.warnings++; const q = state.quizData[state.qIndex];
                state.detailedAnswers[q.id] = { type: 'cheat', val: 'ANULADA: ' + reason, correct: false }; state.isAnswered = true; 
                document.getElementById('cheat-reason').innerText = "Motivo: " + reason; document.getElementById('cheat-overlay').style.display = 'block'; saveState(); 
            };
            window.addEventListener('blur', () => { triggerPenalty("Pérdida de foco en la ventana / App externa"); });
            document.addEventListener("visibilitychange", () => { if (document.hidden) triggerPenalty("Cambio de pestaña oculto"); });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'PrintScreen' || e.code === 'PrintScreen') {
                    triggerPenalty("Intento de Captura de Pantalla detectado");
                }
            });
            document.addEventListener('copy', (e) => { e.preventDefault(); });
            state.focusListenerAdded = true; 
        }
        window.dismissCheat = () => { document.getElementById('cheat-overlay').style.display = 'none'; if(window.next) window.next(); };
        async function verifyStudentKey(key) { if (key === 'Test1973') return "Usuario de Prueba"; if (state.mode === 'local') { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); if (localKeys[key.toUpperCase()]) return localKeys[key.toUpperCase()].nombre; return null; } try { const d = await getDoc(getDocRef('claves_alumnos', key.toUpperCase())); return d.exists() ? d.data().nombre : null; } catch(e) { return null; } }
        async function createStudentKey(key, name) { if (state.mode === 'cloud') { await setDoc(getDocRef('claves_alumnos', key.toUpperCase()), { nombre: name }); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); localKeys[key.toUpperCase()] = { nombre: name }; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        async function deleteStudentKey(key) { if (state.mode === 'cloud') { await deleteDoc(getDocRef('claves_alumnos', key)); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); delete localKeys[key]; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        function listenToData(name, cb) { if (state.mode === 'cloud') onSnapshot(query(getColRef(name)), (s) => cb(s.docs.map(d => ({ id: d.id, ...d.data() })))); }
        function initQuestionData(q) { state.isAnswered = false; state.selectedGroupingItem = null; if (q.type === 'choice' || q.type === 'reading' || q.type === 'listening') state.tempAnswer = null; if (q.type === 'text' || q.type === 'essay') state.tempAnswer = ''; if (q.type === 'matching') { const indices = q.pairs.map((_, i) => i); state.tempAnswer = { leftSelected: null, matches: {}, shuffledRight: shuffle([...indices]) }; } if (q.type === 'order') { state.tempAnswer = { pool: shuffle(q.items.map((item, i) => ({ id: i, text: item }))), answer: [] }; } if (q.type === 'fill-gap') { const regex = /{([^}]+)}/g; let parts = [], correctAnswers = [], match, lastIndex = 0; while ((match = regex.exec(q.text)) !== null) { parts.push(q.text.substring(lastIndex, match.index)); correctAnswers.push(match[1]); lastIndex = regex.lastIndex; } parts.push(q.text.substring(lastIndex)); state.tempAnswer = { userInputs: Array(correctAnswers.length).fill(''), parts, correctAnswers }; } if (q.type === 'grouping') { state.tempAnswer = shuffle(q.items.map((item, i) => ({ ...item, originalIdx: i, currentGroup: null }))); } }
        function render() { const app = document.getElementById('app'); app.innerHTML = ''; const views = { 'setup': renderSetup, 'login': renderLogin, 'quiz': renderQuiz, 'finished': renderFinished, 'admin_login': renderAdminLogin, 'admin_dashboard': renderAdminDashboard }; if (views[state.view]) views[state.view](app); }
        function renderSetup(c) { c.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-lg max-w-md text-center"><h2 class="text-xl font-bold mb-4 text-orange-600">Configuración</h2><button onclick="window.startLocal()" class="bg-blue-100 text-blue-700 px-6 py-3 rounded-lg w-full font-bold mb-4">Usar Modo Local</button></div>`; window.startLocal = () => initLocalMode(); }
        function renderLogin(c) { const isLocal = state.mode === 'local'; c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center fade-in overflow-hidden"><div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph ph-student text-indigo-600 text-3xl"></i></div><h1 class="text-3xl font-bold text-slate-800 mb-2">Mini Quiz - Evolve 2</h1><p class="text-slate-500 mb-6">Ingresa tu clave.</p>${state.firebaseError ? '<div class="text-xs bg-yellow-50 text-yellow-700 p-3 mb-4 rounded-lg">Modo Local Activado</div>' : (isLocal?'<div class="text-xs bg-orange-100 text-orange-800 p-2 mb-4 rounded font-bold">Prueba: Test1973</div>':'')}<input id="ki" placeholder="Tu Clave" class="w-full p-4 border-2 rounded-xl mb-4 text-center text-2xl uppercase focus:border-indigo-500 transition outline-none"><div id="err" class="hidden text-red-500 font-bold mb-4">Clave inválida</div><button id="btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow hover:bg-indigo-700 transition">Entrar</button><button onclick="window.goAdmin()" class="mt-6 text-xs text-slate-400 font-bold uppercase">Profesor</button></div>`; const handle = async () => { const k = document.getElementById('ki').value.trim(); if(!k) return; try { const name = await verifyStudentKey(k); if(name) { state.studentName = name; state.studentKey = k; const restored = restoreState(k); if (restored === true) { renderFinished(document.getElementById('app')); return; } else if (restored === false) { initQuestionData(state.quizData[state.qIndex]); state.view = 'quiz'; startAntiCheat(); render(); return; } state.quizData = shuffle(RAW_QUIZ_DATA); state.qIndex = 0; initQuestionData(state.quizData[0]); state.view = 'quiz'; startAntiCheat(); render(); } else throw new Error(); } catch(e) { document.getElementById('err').classList.remove('hidden'); } }; document.getElementById('btn').onclick = handle; document.getElementById('ki').onkeydown = (e) => { if(e.key === 'Enter') handle(); }; window.goAdmin = () => { state.view = 'admin_login'; render(); }; }
        function renderQuiz(c) { const q = state.quizData[state.qIndex]; const prog = ((state.qIndex) / state.quizData.length) * 100; let contentHtml = '', canSubmit = false; if (q.type === 'text' || q.type === 'essay') { contentHtml = q.type === 'essay' ? `<textarea id="ti" rows="5" class="w-full p-4 border-2 rounded-xl" oninput="window.updateTextState(this.value)">${state.tempAnswer}</textarea>` : `<input id="ti" class="w-full p-4 border-2 rounded-xl" value="${state.tempAnswer}" oninput="window.updateTextState(this.value)">`; canSubmit = state.tempAnswer.length > 0; } else if (q.type === 'grouping') { const poolItems = state.tempAnswer.filter(i => i.currentGroup === null); const poolHtml = poolItems.map(item => { const realIdx = state.tempAnswer.findIndex(x => x.originalIdx === item.originalIdx); return `<div onclick="window.grpClickItem(${realIdx})" class="inline-block px-3 py-2 m-1 border-2 rounded-full font-medium ${state.selectedGroupingItem === realIdx ? 'group-item-selected' : 'bg-white border-slate-200'}">${item.text}</div>`; }).join(''); const groupsHtml = q.groups.map((gName, gIdx) => { const itemsInGroup = state.tempAnswer.filter(i => i.currentGroup === gIdx); const itemsHtml = itemsInGroup.map(item => `<div class="bg-white border p-1 rounded text-sm mb-1 text-center">${item.text}</div>`).join(''); return `<div onclick="window.grpClickGroup(${gIdx})" class="border-2 border-dashed rounded-xl p-3 flex flex-col min-h-[80px] bg-slate-50"><h4 class="text-xs font-bold text-center mb-2">${gName}</h4>${itemsHtml}</div>`; }).join(''); contentHtml = `<div class="p-4 rounded-xl mb-6 flex flex-wrap justify-center bg-slate-100">${poolHtml}</div><div class="grid grid-cols-2 gap-4">${groupsHtml}</div>`; canSubmit = state.tempAnswer.every(i => i.currentGroup !== null); } else if (q.type === 'matching') { const { leftSelected, matches, shuffledRight } = state.tempAnswer; let leftCol = q.pairs.map((p, i) => `<div onclick="window.matchLeft(${i})" class="p-3 border-2 rounded-lg mb-2 match-item ${matches[i]!==undefined ? 'bg-slate-100' : (leftSelected===i ? 'bg-indigo-600 text-white' : 'bg-white')}">${p.left}</div>`).join(''); let rightCol = shuffledRight.map((oIdx) => `<div onclick="window.matchRight(${oIdx})" class="p-3 border-2 rounded-lg mb-2 match-item ${Object.values(matches).includes(oIdx) ? 'bg-slate-100' : 'bg-white'}">${q.pairs[oIdx].right}</div>`).join(''); contentHtml = `<div class="grid grid-cols-2 gap-4"><div>${leftCol}</div><div>${rightCol}</div></div>`; canSubmit = Object.keys(matches).length === q.pairs.length; } else if (q.type === 'choice' || q.type === 'reading' || q.type === 'listening') { let optionsHtml = q.options.map((opt, idx) => `<button onclick="window.ansChoice(${idx})" class="w-full p-4 mb-3 text-left border-2 rounded-xl transition ${state.tempAnswer === idx ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100'}">${opt}</button>`).join(''); contentHtml = (q.type==='reading'?`<div class="reading-text">${q.text}</div>`:'') + optionsHtml; canSubmit = state.tempAnswer !== null; } else if (q.type === 'order') { const { pool, answer } = state.tempAnswer; contentHtml = `<div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed mb-4 min-h-[60px] flex flex-wrap">${answer.map((w,i)=>`<span onclick="window.moveOrder(${i},'back')" class="bg-indigo-100 px-3 py-1 rounded m-1 cursor-pointer">${w.text}</span>`).join('')}</div><div class="flex flex-wrap justify-center">${pool.map((w,i)=>`<span onclick="window.moveOrder(${i},'to')" class="bg-white border px-3 py-1 rounded m-1 cursor-pointer">${w.text}</span>`).join('')}</div>`; canSubmit = pool.length === 0; } else if (q.type === 'fill-gap') { let html = ''; state.tempAnswer.parts.forEach((p, i) => { html += `<span>${p}</span>`; if (i < state.tempAnswer.userInputs.length) html += `<input class="border-b-2 border-indigo-300 w-32 text-center" oninput="window.fillGap(${i}, this.value)" value="${state.tempAnswer.userInputs[i]}">`; }); contentHtml = `<div class="leading-loose">${html}</div>`; canSubmit = state.tempAnswer.userInputs.every(v => v.length > 0); } c.innerHTML = `<div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden fade-in"><div class="h-2 bg-slate-100"><div class="h-full bg-indigo-500" style="width:${prog}%"></div></div><div class="p-8"><div class="flex justify-between mb-4 text-xs font-bold text-slate-400"><span>${state.studentName}</span><span>P. ${state.qIndex+1}/${state.quizData.length}</span></div><h2 class="text-xl font-bold mb-6">${q.q}</h2>${contentHtml}<div class="mt-8"><button id="submit-btn" onclick="window.check()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold disabled:opacity-50" ${canSubmit?'':'disabled'}>${MODO_EXAMEN?'Guardar':'Verificar'}</button></div></div></div>`; }
        window.updateTextState = (val) => { state.tempAnswer = val; render(); }; window.fillGap = (idx, val) => { state.tempAnswer.userInputs[idx] = val; render(); }; window.grpClickItem = (idx) => { state.selectedGroupingItem = idx; render(); }; window.grpClickGroup = (gIdx) => { if(state.selectedGroupingItem!==null) { state.tempAnswer[state.selectedGroupingItem].currentGroup = gIdx; state.selectedGroupingItem = null; render(); } }; window.ansChoice = (idx) => { state.tempAnswer = idx; render(); }; window.matchLeft = (i) => { state.tempAnswer.leftSelected = i; render(); }; window.matchRight = (i) => { if(state.tempAnswer.leftSelected!==null) { state.tempAnswer.matches[state.tempAnswer.leftSelected] = i; state.tempAnswer.leftSelected = null; render(); } }; window.moveOrder = (i, dir) => { const {pool,answer}=state.tempAnswer; if(dir==='to') answer.push(pool.splice(i,1)[0]); else pool.push(answer.splice(i,1)[0]); render(); };
        window.check = () => { const q = state.quizData[state.qIndex]; let isCorrect = false; if (q.type === 'text') isCorrect = normalizeText(state.tempAnswer) === normalizeText(q.correct); if (q.type === 'matching') isCorrect = Object.entries(state.tempAnswer.matches).every(([l,r]) => parseInt(l)===parseInt(r)); if (q.type === 'order') isCorrect = state.tempAnswer.answer.map(a=>a.text).join(' ') === q.items.join(' '); if (q.type === 'fill-gap') isCorrect = state.tempAnswer.userInputs.every((v,i) => normalizeText(v) === normalizeText(state.tempAnswer.correctAnswers[i])); if (q.type === 'grouping') isCorrect = state.tempAnswer.every(i => i.currentGroup === i.group); if (q.type === 'choice' || q.type === 'reading' || q.type === 'listening') isCorrect = state.tempAnswer === q.correct; if (q.type === 'essay') isCorrect = state.tempAnswer.split(" ").length >= (q.minWords || 5); if (isCorrect) state.score++; state.detailedAnswers[q.id] = { type: q.type, val: state.tempAnswer, correct: isCorrect }; window.next(); };
        async function finishQuiz() { state.view = 'finished'; render(); saveState(); if (state.mode === 'cloud') { await addDoc(getColRef('resultados_quiz'), { studentName: state.studentName, studentKey: state.studentKey, score: state.score, totalQuestions: state.quizData.length, timestamp: new Date().toISOString(), warnings: state.warnings, answers: JSON.stringify(state.detailedAnswers) }); } }
        function renderFinished(c) { const n = ((state.score / state.quizData.length) * 10).toFixed(1); c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-md w-full"><i class="ph ph-check-circle text-green-500 text-6xl mb-4"></i><h2 class="text-2xl font-bold mb-2">¡Finalizado!</h2><div class="text-5xl font-black mb-6">${n}</div><button onclick="location.reload()" class="bg-slate-800 text-white px-6 py-4 rounded-xl w-full font-bold">Salir</button></div>`; }
        function renderAdminLogin(c) { c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center"><h2 class="text-xl font-bold mb-4">Profesor</h2><input type="password" id="ap" placeholder="Contraseña" class="w-full p-4 border-2 rounded-xl mb-4 text-center"><button id="abl" class="bg-slate-800 text-white w-full py-4 rounded-xl font-bold">Entrar</button></div>`; document.getElementById('abl').onclick = () => { if (document.getElementById('ap').value === PASSWORD_ADMIN) { state.view = 'admin_dashboard'; startAdmin(); render(); } }; }
        function startAdmin() { if (state.mode === 'cloud') { listenToData('resultados_quiz', d => { state.results = d; render(); }); listenToData('claves_alumnos', d => { state.studentsList = d; render(); }); } else { state.results = []; state.studentsList = []; } }
        function renderAdminDashboard(c) { c.innerHTML = `<div class="w-full max-w-4xl mt-8"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Dashboard</h2><button onclick="location.reload()" class="text-red-500 font-bold">Salir</button></div><div class="flex gap-2 mb-4"><button onclick="window.setTab('results')" class="px-4 py-2 bg-white rounded shadow text-sm font-bold">Resultados</button><button onclick="window.setTab('keys')" class="px-4 py-2 bg-white rounded shadow text-sm font-bold">Alumnos</button></div><div class="bg-white p-4 rounded-xl shadow">${state.adminTab==='results'?'Resultados cargados en consola':'Gestionar alumnos'}</div></div>`; window.setTab = t => { state.adminTab = t; render(); }; }

        init();
    </script>
</body>
</html>
