        function saveState() {
            if (state.studentKey && state.studentKey !== 'Test1973') {

            }

        function restoreState(key) {
            const saved = localStorage.getItem(`quiz_state_${key.toUpperCase()}`);
            if (saved) {
                const d = JSON.parse(saved);
                state.studentName = d.studentName;
                state.score = d.score;
                state.warnings = d.warnings;
                state.detailedAnswers = d.detailedAnswers;
                state.quizData = d.quizOrder.map(id => RAW_QUIZ_DATA.find(x => x.id === id));
                if (d.finished) { state.view = 'finished'; return true; }
                state.qIndex = d.qIndex;
                return false;
            }
            return null;
        }

        async function init() {
            try {
                const app = initializeApp(MI_CONFIGURACION_FIREBASE);
                state.auth = getAuth(app); state.db = getFirestore(app);
                await signInAnonymously(state.auth);
                onAuthStateChanged(state.auth, (u) => { if (u) { state.user = u; state.view = 'login'; render(); } });
            } catch (e) { state.mode = 'local'; state.view = 'login'; render(); }
        }

        function startAntiCheat() {
            if (state.focusListenerAdded) return;
            const handle = () => {
                if (state.view === 'quiz' && state.studentKey !== 'Test1973') {
                    state.warnings++;
                    const q = state.quizData[state.qIndex];
                    state.detailedAnswers[q.id] = { type: 'cheat', val: 'SALIDA DE PANTALLA', correct: false };
                    const t = document.getElementById('penalty-toast');
                    t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000);
                    window.next();
                }
            };
            document.addEventListener("visibilitychange", () => { if (document.hidden) handle(); });
            window.addEventListener('blur', handle);
            state.focusListenerAdded = true;
        }

        async function verifyStudentKey(k) {
            if (k === 'Test1973') return "Modo de Prueba";
            try {
                const d = await getDoc(getDocRef('claves_alumnos', k.toUpperCase()));
                return d.exists() ? d.data().nombre : null;
            } catch(e) { return null; }

        function initQuestionData(q) {
            state.isAnswered = false; state.selectedGroupingItem = null;
            if (['choice','reading','listening'].includes(q.type)) state.tempAnswer = null;
            else if (['text','essay'].includes(q.type)) state.tempAnswer = '';
            else if (q.type === 'matching') state.tempAnswer = { leftSelected: null, matches: {}, shuffledRight: shuffle(q.pairs.map((_, i) => i)) };
            else if (q.type === 'order') state.tempAnswer = { pool: shuffle(q.items.map((t, i) => ({ id: i, text: t }))), answer: [] };
            else if (q.type === 'fill-gap') {
                const regex = /{([^}]+)}/g; let parts = [], correctAnswers = [], m, last = 0;
                while ((m = regex.exec(q.text)) !== null) { parts.push(q.text.substring(last, m.index)); correctAnswers.push(m[1]); last = regex.lastIndex; }
                parts.push(q.text.substring(last));
                state.tempAnswer = { userInputs: Array(correctAnswers.length).fill(''), parts, correctAnswers };
            } else if (q.type === 'grouping') state.tempAnswer = shuffle(q.items.map((it, i) => ({ ...it, originalIdx: i, currentGroup: null })));
        }

                    <div id="err" class="hidden text-red-600 font-bold mb-4 text-sm"><i class="ph ph-x-circle"></i> Clave no válida</div>
                    <button id="btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl active:scale-95">COMENZAR EXAMEN</button>
                    <button onclick="window.goAdmin()" class="mt-10 text-xs text-slate-400 hover:text-indigo-600 font-bold uppercase tracking-widest transition-colors">Panel del Profesor</button>
                </div>`;
            const h = async () => {
                const k = document.getElementById('ki').value.trim(); if(!k) return;
                const name = await verifyStudentKey(k);
                if(name) {
                    state.studentName = name; state.studentKey = k;
                    const res = restoreState(k);
                    if (res === true) { renderFinished(document.getElementById('app')); return; }
                    if (res === false) { initQuestionData(state.quizData[state.qIndex]); state.view = 'quiz'; startAntiCheat(); render(); return; }
                    state.quizData = shuffle(RAW_QUIZ_DATA); 
                    state.qIndex = 0; state.detailedAnswers = {}; initQuestionData(state.quizData[0]);
                    state.view = 'quiz'; startAntiCheat(); render();
                } else { document.getElementById('err').classList.remove('hidden'); }
            };
            document.getElementById('btn').onclick = h;
            document.getElementById('ki').onkeydown = (e) => { if(e.key === 'Enter') h(); };
            window.goAdmin = () => { state.view = 'admin_login'; render(); };
        }

        function renderQuiz(c) {
            const q = state.quizData[state.qIndex];
            const prog = (state.qIndex / state.quizData.length) * 100;
            let content = '', canSub = false;

            if (['text','essay'].includes(q.type)) {
                content = `<textarea id="ti" rows="4" class="w-full p-5 border-2 rounded-2xl text-lg focus:border-indigo-500 outline-none shadow-inner" placeholder="Escribe aquí..." oninput="window.upText(this.value)">${state.tempAnswer}</textarea>`;
                canSub = state.tempAnswer.trim().length > 0;
            } else if (q.type === 'grouping') {
                const poolItems = state.tempAnswer.filter(i => i.currentGroup === null);
                const poolH = poolItems.length === 0 ? `<div class="text-slate-400 italic py-4">Todo clasificado</div>` : poolItems.map(it => {
                    const rIdx = state.tempAnswer.findIndex(x => x.originalIdx === it.originalIdx);
                    return `<div onclick="window.grpItem(${rIdx})" class="inline-block px-4 py-2 m-1 border-2 rounded-full font-bold group-item ${state.selectedGroupingItem === rIdx ? 'group-item-selected' : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300'}">${it.text}</div>`;
                }).join('');
                const groupsH = q.groups.map((gn, gi) => {
                    const its = state.tempAnswer.filter(i => i.currentGroup === gi);
                    return `<div onclick="window.grpGroup(${gi})" class="border-2 border-dashed rounded-2xl p-4 flex flex-col min-h-[120px] ${state.selectedGroupingItem !== null ? 'border-indigo-400 bg-indigo-50' : 'border-slate-200 bg-slate-50'}">
                        <h4 class="text-xs font-black uppercase text-indigo-500 mb-3 text-center">${gn}</h4>
                        <div class="flex flex-col gap-2">${its.map(it => `<div onclick="window.grpItem(${state.tempAnswer.findIndex(x => x.originalIdx === it.originalIdx)}); event.stopPropagation();" class="bg-white border border-slate-200 p-2 rounded-lg text-sm font-bold shadow-sm text-center cursor-pointer hover:text-red-500">${it.text}</div>`).join('')}</div>
                    </div>`;
                }).join('');
                content = `<div class="bg-white p-6 rounded-2xl mb-6 shadow-sm border border-slate-100">${poolH}</div><div class="grid grid-cols-2 gap-4">${groupsH}</div>`;
                canSub = state.tempAnswer.every(i => i.currentGroup !== null);
            } else if (q.type === 'matching') {
                const { leftSelected, matches, shuffledRight } = state.tempAnswer;
                let lC = q.pairs.map((p, i) => `<div onclick="window.matchL(${i})" class="p-4 border-2 rounded-xl mb-3 match-item font-bold ${matches[i] !== undefined ? 'bg-slate-100 text-slate-300 border-slate-100' : (leftSelected === i ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border-slate-200')}">${p.left}</div>`).join('');
                let rC = shuffledRight.map(oIdx => `<div onclick="window.matchR(${oIdx})" class="p-4 border-2 rounded-xl mb-3 match-item font-bold ${Object.values(matches).includes(oIdx) ? 'bg-slate-100 text-slate-300 border-slate-100' : 'bg-white border-slate-200'}">${q.pairs[oIdx].right}</div>`).join('');
                content = `<div class="grid grid-cols-2 gap-6"><div>${lC}</div><div>${rC}</div></div>`;
                canSub = Object.keys(matches).length === q.pairs.length;
            } else if (['choice','reading','listening'].includes(q.type)) {
                let eH = ''; if (q.type === 'reading') eH = `<div class="reading-text">${q.text}</div>`;
                if (q.type === 'listening') eH = `<div class="listening-banner"><i class="ph ph-speaker-high text-3xl"></i> LISTEN TO THE TEACHER</div>`;
                content = eH + q.options.map((opt, i) => `<button onclick="window.ansC(${i})" class="w-full p-5 mb-4 text-left border-2 rounded-2xl transition-all font-bold ${state.tempAnswer === i ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-500' : 'border-slate-100 bg-white hover:border-indigo-200'}">${opt}</button>`).join('');
                canSub = state.tempAnswer !== null;
            } else if (q.type === 'order') {
                const { pool, answer } = state.tempAnswer;
                content = `<div class="bg-slate-50 p-6 rounded-2xl border-2 border-dashed mb-6 flex flex-wrap min-h-[80px] items-center shadow-inner">${answer.map((w,i) => `<span onclick="window.mvO(${i},'back')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold m-1 shadow-md cursor-pointer">${w.text}</span>`).join('') || '<p class="text-slate-400 italic text-sm w-full text-center">Toca las palabras para formar la frase...</p>'}</div>
                           <div class="flex flex-wrap justify-center">${pool.map((w,i) => `<span onclick="window.mvO(${i},'to')" class="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl m-1 font-bold hover:border-indigo-400 shadow-sm cursor-pointer transition-colors">${w.text}</span>`).join('')}</div>`;
                canSub = pool.length === 0;
            } else if (q.type === 'fill-gap') {
                const { parts, userInputs } = state.tempAnswer; let h = '';
                parts.forEach((p, i) => {
                    h += `<span>${p.replace(/\n/g, '<br>')}</span>`;
                    if (i < userInputs.length) h += `<input class="border-b-4 border-indigo-400 px-2 mx-1 w-32 sm:w-48 text-center bg-transparent text-indigo-700 font-black focus:outline-none focus:border-indigo-600 transition-all" value="${userInputs[i]}" oninput="window.fG(${i}, this.value)">`;
                });
                content = `<div class="leading-relaxed text-xl text-slate-700 font-medium">${h}</div>`;
                canSub = userInputs.every(v => v.trim().length > 0);
            }

            c.innerHTML = `
                <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
                    <div class="h-3 bg-slate-100"><div class="h-full bg-indigo-600 transition-all duration-500" style="width:${prog}%"></div></div>
                    <div class="p-10">
                        <div class="flex justify-between items-center mb-8">
                            <div class="flex items-center gap-2 bg-indigo-50 px-4 py-2 rounded-full"><i class="ph ph-user text-indigo-600 font-bold"></i><span class="font-black text-indigo-900 text-sm truncate max-w-[150px] uppercase">${state.studentName}</span></div>
                            <span class="text-slate-400 font-black text-sm tracking-widest uppercase">Question ${state.qIndex+1} / ${state.quizData.length}</span>
                        </div>
                        <h2 class="text-2xl font-black mb-8 text-slate-800 leading-tight">${q.q}</h2>
                        ${content}
                        <div class="mt-12 flex gap-4">
                            <button onclick="window.check()" class="flex-1 bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all disabled:opacity-30 active:scale-95" ${canSub ? '' : 'disabled'}>SAVE ANSWER</button>
                        </div>
                        ${state.studentKey === 'Test1973' ? `<div class="mt-8 pt-6 border-t border-slate-100 flex gap-2"><button onclick="window.next()" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-xs font-bold uppercase hover:bg-slate-200">Saltar Question</button></div>` : ''}
                    </div>
                </div>`;
        }

        window.upText = (v) => { state.tempAnswer = v; render(); };
        window.fG = (i, v) => { state.tempAnswer.userInputs[i] = v; render(); };
        window.grpItem = (i) => { if(state.tempAnswer[i].currentGroup !== null) { state.tempAnswer[i].currentGroup = null; state.selectedGroupingItem = null; } else { state.selectedGroupingItem = (state.selectedGroupingItem === i) ? null : i; } render(); };
        window.grpGroup = (gi) => { if(state.selectedGroupingItem === null) return; state.tempAnswer[state.selectedGroupingItem].currentGroup = gi; state.selectedGroupingItem = null; render(); };
        window.matchL = (i) => { if(state.tempAnswer.matches[i] !== undefined) return; state.tempAnswer.leftSelected = i; render(); };
        window.matchR = (oi) => { if(state.tempAnswer.leftSelected === null) return; state.tempAnswer.matches[state.tempAnswer.leftSelected] = oi; state.tempAnswer.leftSelected = null; render(); };
        window.ansC = (i) => { state.tempAnswer = i; render(); };
        window.mvO = (i, d) => { const {pool, answer} = state.tempAnswer; if(d==='to') answer.push(pool.splice(i,1)[0]); else pool.push(answer.splice(i,1)[0]); render(); };

        window.check = () => {
            const q = state.quizData[state.qIndex]; let isC = false;
            if (q.type === 'text') isC = normalizeText(state.tempAnswer) === normalizeText(q.correct);
            else if (q.type === 'matching') isC = Object.entries(state.tempAnswer.matches).every(([l,r]) => parseInt(l) === parseInt(r));
            else if (q.type === 'order') isC = state.tempAnswer.answer.map(a => a.text).join(' ') === q.items.join(' ');
            else if (q.type === 'fill-gap') isC = state.tempAnswer.userInputs.every((v,i) => normalizeText(v) === normalizeText(state.tempAnswer.correctAnswers[i]));
            else if (q.type === 'grouping') isC = state.tempAnswer.every(i => i.currentGroup === i.group);
            else if (['choice','reading','listening'].includes(q.type)) isC = state.tempAnswer === q.correct;
            
            if (isC) state.score++;
            state.detailedAnswers[q.id] = { type: q.type, val: state.tempAnswer, correct: isC };
            saveState(); window.next();
        };

        window.next = () => { if (state.qIndex + 1 < state.quizData.length) { state.qIndex++; initQuestionData(state.quizData[state.qIndex]); render(); } else { finishQuiz(); } };

        async function finishQuiz() {
            state.view = 'finished'; render(); saveState();
            const n = ((state.score / state.quizData.length) * 10).toFixed(1);
            if (state.mode === 'cloud') {
                try {
                    await addDoc(getColRef('resultados_quiz'), { studentName: state.studentName, studentKey: state.studentKey, score: state.score, grade10: n, totalQuestions: state.quizData.length, warnings: state.warnings, timestamp: new Date().toISOString(), answers: JSON.stringify(state.detailedAnswers) });
                } catch(e) {}
            }
        }

        function renderFinished(c) {
            const n = ((state.score / state.quizData.length) * 10).toFixed(1);
            c.innerHTML = `
                <div class="bg-white p-12 rounded-3xl shadow-2xl text-center fade-in max-w-md w-full">
                    <div class="text-green-500 text-8xl mb-6"><i class="ph ph-check-circle-fill"></i></div>
                    <h2 class="text-3xl font-black mb-2 text-slate-800">Exam Completed</h2>
                    <p class="text-slate-500 mb-8 font-medium">Well done, ${state.studentName}!</p>
                    <div class="bg-indigo-50 p-8 rounded-3xl mb-8 border-2 border-indigo-100">
                        <div class="text-6xl font-black text-indigo-600 mb-2">${n}</div>
                        <div class="text-xs text-indigo-400 font-black tracking-widest uppercase">Final Grade</div>
                    </div>
                    <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-slate-900 transition-all">EXIT SYSTEM</button>
                </div>`;
        }

        function renderAdminLogin(c) {
            c.innerHTML = `
                <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center fade-in">
                    <h2 class="text-2xl font-black mb-6 text-slate-800 uppercase tracking-tight">Teacher Access</h2>
                    <input type="password" id="ap" placeholder="Contraseña Admin" class="w-full p-5 border-2 rounded-2xl mb-4 text-center text-xl font-bold focus:border-indigo-500 outline-none shadow-sm">
                    <div id="aerr" class="hidden text-red-600 font-bold mb-4 text-sm">Acceso denegado</div>
                    <button id="abl" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-slate-900 transition-all">LOGIN</button>
                    <button onclick="location.reload()" class="mt-8 text-xs text-slate-400 font-bold uppercase hover:text-indigo-600">Volver</button>
                </div>`;
            const att = () => { if (document.getElementById('ap').value === PASSWORD_ADMIN) { state.view = 'admin_dashboard'; startAdmin(); render(); } else { document.getElementById('aerr').classList.remove('hidden'); } };
            document.getElementById('abl').onclick = att;
            document.getElementById('ap').onkeydown = (e) => { if(e.key === 'Enter') att(); };
        }

        async function startAdmin() {
            if (state.mode === 'cloud') {
                onSnapshot(query(getColRef('resultados_quiz')), (s) => { state.results = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)); if(state.view === 'admin_dashboard') render(); });
                onSnapshot(query(getColRef('claves_alumnos')), (s) => { state.studentsList = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.nombre.localeCompare(b.nombre)); if(state.view === 'admin_dashboard') render(); });
            }
        }

        function renderAdminDashboard(c) {
            const rows = state.adminTab === 'results' ? state.results.map((r, i) => `
                <tr class="border-b text-sm hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-black text-slate-400">${i+1}</td>
                    <td class="p-4 font-bold text-slate-700">${r.studentName}</td>
                    <td class="p-4"><span class="bg-indigo-600 text-white px-3 py-1 rounded-lg font-black text-base shadow-sm">${r.grade10}</span></td>
                    <td class="p-4 text-center">${r.warnings > 0 ? `<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full font-black text-xs">⚠️ ${r.warnings}</span>` : `<i class="ph ph-check-circle text-green-500 text-xl"></i>`}</td>
                    <td class="p-4 text-right">
                        <button onclick="window.rev('${r.id}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-100 mr-2"><i class="ph ph-eye-bold"></i></button>
                        <button onclick="window.delR('${r.id}')" class="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><i class="ph ph-trash-bold"></i></button>
                    </td>
                </tr>`).join('') : state.studentsList.map(s => `
                <tr class="border-b text-sm">
                    <td class="p-4 font-black text-indigo-600">${s.id}</td>
                    <td class="p-4 font-bold">${s.nombre}</td>
                    <td class="p-4 text-right"><button onclick="window.delK('${s.id}')" class="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><i class="ph ph-trash-bold"></i></button></td>
                </tr>`).join('');

            c.innerHTML = `
                <div class="w-full max-w-5xl fade-in self-start mt-8">
                    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h2 class="text-3xl font-black flex items-center gap-3"><i class="ph ph-shield-check text-indigo-600"></i> Control Panel</h2>
                        <button onclick="location.reload()" class="bg-red-50 text-red-600 px-6 py-3 rounded-2xl font-black text-sm hover:bg-red-100 shadow-sm transition-all">LOGOUT</button>
                    </div>
                    <div class="flex gap-3 mb-6 bg-slate-200 p-2 rounded-2xl inline-flex shadow-inner">
                        <button onclick="window.sT('results')" class="px-8 py-3 rounded-xl text-sm font-black transition-all ${state.adminTab==='results'?'bg-white shadow-lg text-indigo-600':'text-slate-500 hover:text-slate-700'}">STUDENT RESULTS</button>
                        <button onclick="window.sT('keys')" class="px-8 py-3 rounded-xl text-sm font-black transition-all ${state.adminTab==='keys'?'bg-white shadow-lg text-indigo-600':'text-slate-500 hover:text-slate-700'}">STUDENT DATABASE</button>
                    </div>
                    ${state.adminTab === 'results' ? `<div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100"><table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200"><tr class="text-xs text-slate-400 font-black uppercase tracking-widest"><th class="p-5">#</th><th class="p-5">Student</th><th class="p-5">Grade</th><th class="p-5 text-center">Security</th><th class="p-5"></th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="5" class="p-10 text-center text-slate-300 font-bold italic">No results yet</td></tr>'}</tbody>
                    </table></div>` : `
                    <div class="mb-6 bg-white p-6 rounded-3xl shadow-xl border border-slate-100 grid grid-cols-3 gap-4">
                        <input id="nk" placeholder="Clave (Ej: JUAN01)" class="p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-400 outline-none bg-slate-50">
                        <input id="nn" placeholder="Nombre Completo" class="p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-400 outline-none bg-slate-50">
                        <button onclick="window.addK()" class="bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-lg transition-all active:scale-95">REGISTER STUDENT</button>
                    </div>
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100"><table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200"><tr class="text-xs text-slate-400 font-black uppercase tracking-widest"><th class="p-5">Access Key</th><th class="p-5">Full Name</th><th class="p-5"></th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table></div>`}
                </div>`;
            window.sT = t => { state.adminTab = t; render(); };
            window.delR = async (id) => { if(confirm("¿Borrar resultado?")) await deleteDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'resultados_quiz', id)); };
            window.delK = async (id) => { if(confirm("¿Borrar alumno?")) await deleteDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'claves_alumnos', id)); };
            window.addK = async () => { const k=document.getElementById('nk').value.toUpperCase(), n=document.getElementById('nn').value; if(k&&n) { await setDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'claves_alumnos', k), { nombre: n }); document.getElementById('nk').value=''; document.getElementById('nn').value=''; } };
            window.rev = (id) => {
                const r = state.results.find(x => x.id === id); if(!r) return;
                let ans = {}; try { ans = JSON.parse(r.answers || '{}'); } catch(e){}
                let h = `<div class="mb-8 bg-indigo-600 p-8 rounded-3xl text-white shadow-xl flex justify-between items-center"><div><h4 class="font-black text-3xl mb-1">${r.studentName}</h4><p class="text-indigo-200 text-xs font-black uppercase tracking-widest">${r.studentKey}</p></div><div class="text-right"><p class="text-[10px] font-black uppercase opacity-60">Final Grade</p><p class="text-5xl font-black">${r.grade10}</p></div></div>`;
                RAW_QUIZ_DATA.forEach((q, i) => {
                    const a = ans[q.id]; let s = "No answer", c = false;
                    if (a) {
                        c = a.correct; if(a.type==='cheat') s=`<span class="text-red-600 font-black">SECURITY ALERT: EXIT DETECTED</span>`;
                        else if (['choice','reading','listening'].includes(q.type)) s = q.options[a.val] || "Invalid index";
                        else if (['text','essay'].includes(q.type)) s = a.val;
                        else if (q.type === 'fill-gap') s = `Responses: ${a.val.userInputs.join(', ')}`;
                        else s = "Completed via interaction";
                    }
                    h += `<div class="mb-6 p-6 rounded-2xl border-2 ${c?'border-green-100 bg-green-50/30':'border-red-100 bg-red-50/30'}">
                        <div class="flex justify-between items-center mb-4"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Q${i+1} (${q.type})</span><span class="px-3 py-1 rounded-full text-[10px] font-black ${c?'bg-green-500 text-white':'bg-red-500 text-white'}">${c?'PASS':'FAIL'}</span></div>
                        <p class="font-bold text-slate-800 mb-4">${q.q}</p>
                        <div class="p-4 rounded-xl bg-white border border-slate-100 text-sm font-bold text-slate-600 shadow-inner">${s}</div>
                    </div>`;
                });
                document.getElementById('review-content').innerHTML = h; document.getElementById('review-modal').classList.remove('hidden');
            };
        }

        init();
    </script>
</body>
</html>
