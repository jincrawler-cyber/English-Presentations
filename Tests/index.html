<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido | Portal Educativo JCB</title>
    <style>
        :root {
            --primary-color: #004a99; /* Azul Universitario - Cámbialo si quieres */
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: #ffffff;
            --error-color: #d93025;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .lock-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .lock-container:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-weight: 600;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* Importante para el padding */
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #003a77;
        }

        button:active {
            transform: scale(0.98);
        }

        #error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        /* Animación de error (vibración) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
        }
    </style>
</head>
<body>

<div class="lock-container" id="lockCard">
    <div class="icon-box">🔒</div> <h2>Acceso Restringido</h2>
    <p>Este material requiere una clave de acceso.</p>
    
    <div class="input-group">
        <input type="password" id="passwordField" placeholder="Introduce la clave">
    </div>
    
    <button onclick="checkPassword()">Validar Clave</button>
    <p id="error-message">❌ Clave incorrecta. Inténtalo de nuevo.</p>
</div>

<script>
    // --- CONFIGURACIÓN ---
    // 1. Define tu contraseña aquí (entre comillas)
    const CORRECT_PASSWORD = "Roponji"; 
    
    // 2. Define el nombre del archivo HTML de tu presentación real
    const TARGET_FILE = "/Test"; 
    // --- FIN CONFIGURACIÓN ---

    const passwordField = document.getElementById('passwordField');
    const errorMessage = document.getElementById('error-message');
    const lockCard = document.getElementById('lockCard');

    function checkPassword() {
        const enteredPassword = passwordField.value;
        
        if (enteredPassword === CORRECT_PASSWORD) {
            // Clave correcta: Redirigir
            errorMessage.style.display = 'none';
            window.location.href = TARGET_FILE;
        } else {
            // Clave incorrecta: Mostrar error y animar
            errorMessage.style.display = 'block';
            lockCard.classList.add('shake');
            passwordField.value = ''; // Limpiar campo
            
            // Quitar la clase de animación después de que termine para poder repetirla
            setTimeout(() => {
                lockCard.classList.remove('shake');
            }, 500);
        }
    }

    // Permitir usar la tecla Enter para validar
    passwordField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // Ocultar mensaje de error al empezar a escribir de nuevo
    passwordField.addEventListener('input', function() {
        if (errorMessage.style.display === 'block') {
            errorMessage.style.display = 'none';
        }
    });
</script>

</body>
</html>
