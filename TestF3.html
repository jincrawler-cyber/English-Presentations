  { "id": 19, "type": "text", "q": "What is the past tense of the verb 'run'?", "correct": "ran" },
  { "id": 20, "type": "text", "q": "What do you call a person who works for a company? (Singular)", "correct": "employee" },
  { "id": 21, "type": "grouping", "q": "Classify the words into Categories:", "groups": ["Work", "People"], "items": [{"text": "Office", "group": 0}, {"text": "Salary", "group": 0}, {"text": "Cousin", "group": 1}, {"text": "Grandmother", "group": 1}] },
  { "id": 22, "type": "grouping", "q": "Classify verbs by Tense:", "groups": ["Regular Past", "Irregular Past"], "items": [{"text": "Played", "group": 0}, {"text": "Watched", "group": 0}, {"text": "Ate", "group": 1}, {"text": "Bought", "group": 1}] },
  { "id": 23, "type": "reading", "q": "According to the text, why did Mark change his job?", "text": "Mark used to work in a bank. He worked long hours and didn't have time for his family. Last month, he found a new job as a photographer. Now he works part-time and is very happy.", "options": ["Because he wanted more money", "Because he wanted more time with his family", "Because he moved to another city"], "correct": 1 },
  { "id": 24, "type": "reading", "q": "How does Mark feel now?", "text": "Mark used to work in a bank. He worked long hours and didn't have time for his family. Last month, he found a new job as a photographer. Now he works part-time and is very happy.", "options": ["Stressed", "Sad", "Happy"], "correct": 2 },
  { "id": 25, "type": "reading", "q": "Is Mark working full-time now?", "text": "Mark used to work in a bank. He worked long hours and didn't have time for his family. Last month, he found a new job as a photographer. Now he works part-time and is very happy.", "options": ["Yes, he is.", "No, he isn't.", "The text doesn't say."], "correct": 1 }
]; 

        let state = { view: 'init', user: null, mode: 'cloud', studentName: '', studentKey: '', quizData: [], qIndex: 0, score: 0, tempAnswer: null, isAnswered: false, selectedGroupingItem: null, detailedAnswers: {}, results: [], studentsList: [], db: null, auth: null, adminTab: 'results', appId: 'evolve2-u1-u23-quiz', warnings: 0, focusListenerAdded: false, firebaseError: null };

        const getColRef = (name) => collection(state.db, 'artifacts', state.appId, 'public', 'data', name);
        const getDocRef = (colName, docId) => doc(state.db, 'artifacts', state.appId, 'public', 'data', colName, docId);
        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
        function normalizeText(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
        const playAlarm = () => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(440, ctx.currentTime); gain.gain.setValueAtTime(0.6, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1); osc.start(); osc.stop(ctx.currentTime + 1); } catch(e) {} };
        function saveState() { if (state.studentKey && state.studentKey !== 'Test1973') { const savedData = { studentName: state.studentName, qIndex: state.qIndex, score: state.score, warnings: state.warnings, detailedAnswers: state.detailedAnswers, quizOrder: state.quizData.map(q => q.id), finished: state.view === 'finished', timestamp: new Date().toISOString() }; localStorage.setItem(`quiz_state_${state.studentKey.toUpperCase()}`, JSON.stringify(savedData)); } }
        function restoreState(key) { const saved = localStorage.getItem(`quiz_state_${key.toUpperCase()}`); if (saved) { const data = JSON.parse(saved); state.studentName = data.studentName || state.studentName; if (data.finished) { state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); state.view = 'finished'; return true; } else { state.qIndex = data.qIndex; state.score = data.score; state.warnings = data.warnings; state.detailedAnswers = data.detailedAnswers; state.quizData = restoreOrder(data.quizOrder); return false; } } return null; }
        function restoreOrder(orderIds) { let ordered = []; orderIds.forEach(id => { const q = RAW_QUIZ_DATA.find(x => x.id === id); if (q) ordered.push(q); }); return ordered; }
        window.next = () => { if (state.qIndex + 1 < state.quizData.length) { state.qIndex++; initQuestionData(state.quizData[state.qIndex]); saveState(); render(); } else { finishQuiz(); } };

        window.addEventListener('unhandledrejection', (event) => {
            console.warn("Falla capturada:", event.reason);
            const appEl = document.getElementById('app');
            if(appEl && appEl.innerHTML.includes('Cargando')) {
                state.firebaseError = "Fallo de red o permisos (" + event.reason.message + ")";
                initLocalMode();
            }
        });

        function init() { 
            try { 
                if (typeof __app_id !== 'undefined') state.appId = __app_id; 
                let c = MI_CONFIGURACION_FIREBASE; 
                if (!c && typeof __firebase_config !== 'undefined') c = JSON.parse(__firebase_config); 
                if (c) { initFirebase(c); } else { state.view = 'setup'; render(); } 
            } catch (e) { console.warn("Error en init:", e); state.view = 'setup'; render(); } 
        }
        function initFirebase(config) { 
            try { 
                const app = initializeApp(config); state.auth = getAuth(app); state.db = getFirestore(app); 
                const authPromise = (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !MI_CONFIGURACION_FIREBASE) ? signInWithCustomToken(state.auth, __initial_auth_token) : signInAnonymously(state.auth);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Tiempo de conexión agotado.")), 8000));
                Promise.race([authPromise, timeoutPromise]).then((userCred) => {
                    state.user = userCred.user; state.view = 'login'; render();
                    onAuthStateChanged(state.auth, (u) => { if (u) state.user = u; });
                }).catch((e) => { console.warn("Firebase Auth abortado.", e.message); state.firebaseError = e.message; initLocalMode(); });
            } catch(e) { console.warn("Firebase falló.", e.message); state.firebaseError = e.message; initLocalMode(); } 
        }
        function initLocalMode() { state.mode = 'local'; state.user = { uid: 'local-' + Date.now() }; state.view = 'login'; render(); }
        function startAntiCheat() { 
            if (state.focusListenerAdded || state.studentKey === 'Test1973') return; 
            const triggerPenalty = (reason) => {
                if (state.view !== 'quiz' || state.isAnswered) return;
                playAlarm(); state.warnings++; const q = state.quizData[state.qIndex];
                state.detailedAnswers[q.id] = { type: 'cheat', val: 'ANULADA: ' + reason, correct: false }; state.isAnswered = true; 
                document.getElementById('cheat-reason').innerText = "Motivo: " + reason; document.getElementById('cheat-overlay').style.display = 'block'; saveState(); 
            };
            window.addEventListener('blur', () => { triggerPenalty("Pérdida de foco"); });
            document.addEventListener("visibilitychange", () => { if (document.hidden) triggerPenalty("Cambio de pestaña"); });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'PrintScreen') triggerPenalty("Intento de Captura de Pantalla");
            });
            document.addEventListener('copy', (e) => { e.preventDefault(); });
            state.focusListenerAdded = true; 
        }
        window.dismissCheat = () => { document.getElementById('cheat-overlay').style.display = 'none'; if(window.next) window.next(); };
        async function verifyStudentKey(key) { if (key === 'Test1973') return "Usuario de Prueba"; if (state.mode === 'local') { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); if (localKeys[key.toUpperCase()]) return localKeys[key.toUpperCase()].nombre; return null; } try { const d = await getDoc(getDocRef('claves_alumnos', key.toUpperCase())); return d.exists() ? d.data().nombre : null; } catch(e) { return null; } }
        async function createStudentKey(key, name) { if (state.mode === 'cloud') { await setDoc(getDocRef('claves_alumnos', key.toUpperCase()), { nombre: name }); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); localKeys[key.toUpperCase()] = { nombre: name }; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        async function deleteStudentKey(key) { if (state.mode === 'cloud') { await deleteDoc(getDocRef('claves_alumnos', key)); } else { const localKeys = JSON.parse(localStorage.getItem('quiz_keys_local') || '{}'); delete localKeys[key]; localStorage.setItem('quiz_keys_local', JSON.stringify(localKeys)); startAdmin(); } }
        function listenToData(name, cb) { if (state.mode === 'cloud') onSnapshot(query(getColRef(name)), (s) => cb(s.docs.map(d => ({ id: d.id, ...d.data() })))); }
        function initQuestionData(q) { state.isAnswered = false; state.selectedGroupingItem = null; if (q.type === 'choice' || q.type === 'reading') state.tempAnswer = null; if (q.type === 'text') state.tempAnswer = ''; if (q.type === 'matching') { const indices = q.pairs.map((_, i) => i); state.tempAnswer = { leftSelected: null, matches: {}, shuffledRight: shuffle([...indices]) }; } if (q.type === 'order') { state.tempAnswer = { pool: shuffle(q.items.map((item, i) => ({ id: i, text: item }))), answer: [] }; } if (q.type === 'fill-gap') { const regex = /{([^}]+)}/g; let parts = [], correctAnswers = [], match, lastIndex = 0; while ((match = regex.exec(q.text)) !== null) { parts.push(q.text.substring(lastIndex, match.index)); correctAnswers.push(match[1]); lastIndex = regex.lastIndex; } parts.push(q.text.substring(lastIndex)); state.tempAnswer = { userInputs: Array(correctAnswers.length).fill(''), parts, correctAnswers }; } if (q.type === 'grouping') { state.tempAnswer = shuffle(q.items.map((item, i) => ({ ...item, originalIdx: i, currentGroup: null }))); } }
        function render() { const app = document.getElementById('app'); app.innerHTML = ''; const views = { 'setup': renderSetup, 'login': renderLogin, 'quiz': renderQuiz, 'finished': renderFinished, 'admin_login': renderAdminLogin, 'admin_dashboard': renderAdminDashboard }; if (views[state.view]) views[state.view](app); }
        function renderSetup(c) { c.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-lg max-w-md text-center"><h2 class="text-xl font-bold mb-4 text-orange-600">Configuración</h2><button onclick="window.startLocal()" class="bg-blue-100 text-blue-700 px-6 py-3 rounded-lg w-full font-bold mb-4 hover:bg-blue-200 transition">Modo Local</button></div>`; window.startLocal = () => initLocalMode(); }
        function renderLogin(c) { const isLocal = state.mode === 'local'; c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center fade-in"><div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph ph-student text-indigo-600 text-3xl"></i></div><h1 class="text-3xl font-bold text-slate-800 mb-2">Evolve 2: Unit 1-2.3</h1><p class="text-slate-500 mb-6">Ingresa tu clave de alumno.</p><input id="ki" placeholder="Tu Clave" class="w-full p-4 border-2 rounded-xl mb-4 text-center text-2xl uppercase focus:border-indigo-500 outline-none"><div id="err" class="hidden text-red-500 font-bold mb-4">Clave inválida</div><button id="btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow hover:bg-indigo-700 transition">Comenzar</button><button onclick="window.goAdmin()" class="mt-6 text-xs text-slate-400 font-bold uppercase hover:text-slate-600 transition">Portal Profesor</button></div>`; const handle = async () => { const k = document.getElementById('ki').value.trim(); if(!k) return; try { const name = await verifyStudentKey(k); if(name) { state.studentName = name; state.studentKey = k; const restored = restoreState(k); if (restored === true) { renderFinished(document.getElementById('app')); return; } else if (restored === false) { initQuestionData(state.quizData[state.qIndex]); state.view = 'quiz'; startAntiCheat(); render(); return; } state.quizData = shuffle([...RAW_QUIZ_DATA]); state.qIndex = 0; state.detailedAnswers = {}; initQuestionData(state.quizData[0]); state.view = 'quiz'; startAntiCheat(); render(); } else throw new Error(); } catch(e) { document.getElementById('err').classList.remove('hidden'); } }; document.getElementById('btn').onclick = handle; document.getElementById('ki').onkeydown = (e) => { if(e.key === 'Enter') handle(); }; window.goAdmin = () => { state.view = 'admin_login'; render(); }; }
        function renderQuiz(c) { const q = state.quizData[state.qIndex]; const prog = ((state.qIndex) / state.quizData.length) * 100; let contentHtml = '', canSubmit = false; if (q.type === 'text') { contentHtml = `<input id="ti" class="w-full p-4 border-2 rounded-xl text-lg border-slate-200 focus:border-indigo-500 outline-none" placeholder="Type answer..." value="${state.tempAnswer}" oninput="window.updateTextState(this.value)" ${state.isAnswered?'disabled':''}>`; canSubmit = !state.isAnswered && state.tempAnswer.length > 0; } else if (q.type === 'grouping') { const poolItems = state.tempAnswer.filter(i => i.currentGroup === null); const poolHtml = poolItems.map(item => { const realIdx = state.tempAnswer.findIndex(x => x.originalIdx === item.originalIdx); const isSel = state.selectedGroupingItem === realIdx; return `<div onclick="window.grpClickItem(${realIdx})" class="inline-block px-3 py-2 m-1 border-2 rounded-full font-medium group-item ${isSel ? 'group-item-selected' : 'bg-white border-slate-200'}">${item.text}</div>`; }).join(''); const groupsHtml = q.groups.map((gName, gIdx) => { const itemsInGroup = state.tempAnswer.filter(i => i.currentGroup === gIdx); const itemsHtml = itemsInGroup.map(item => `<div class="bg-white border border-slate-200 px-2 py-1 rounded text-sm mb-1 text-center">${item.text}</div>`).join(''); return `<div onclick="window.grpClickGroup(${gIdx})" class="border-2 border-dashed rounded-xl p-3 bg-slate-50"><h4 class="text-xs font-bold uppercase text-slate-500 mb-2 text-center">${gName}</h4><div class="min-h-[40px]">${itemsHtml}</div></div>`; }).join(''); contentHtml = `<div class="bg-slate-100 p-4 rounded-xl mb-6 flex flex-wrap justify-center min-h-[60px]">${poolHtml}</div><div class="grid grid-cols-2 gap-4">${groupsHtml}</div>`; canSubmit = !state.isAnswered && state.tempAnswer.every(i => i.currentGroup !== null); } else if (q.type === 'matching') { const { leftSelected, matches, shuffledRight } = state.tempAnswer; let leftCol = q.pairs.map((p, i) => { let style = matches[i]!==undefined ? "bg-slate-100 text-slate-400" : (leftSelected===i ? "bg-indigo-600 text-white" : "bg-white"); return `<div onclick="window.matchLeft(${i})" class="p-3 border-2 rounded-lg mb-2 match-item font-medium ${style}">${p.left}</div>`; }).join(''); let rightCol = shuffledRight.map((oIdx) => { const isMatched = Object.values(matches).includes(oIdx); let style = isMatched ? "bg-slate-100 text-slate-400" : "bg-white"; return `<div onclick="window.matchRight(${oIdx})" class="p-3 border-2 rounded-lg mb-2 match-item font-medium ${style}">${q.pairs[oIdx].right}</div>`; }).join(''); contentHtml = `<div class="grid grid-cols-2 gap-4"><div>${leftCol}</div><div>${rightCol}</div></div>`; canSubmit = !state.isAnswered && Object.keys(matches).length === q.pairs.length; } else if (q.type === 'choice' || q.type === 'reading') { let extraHtml = q.type === 'reading' ? `<div class="reading-text">${q.text}</div>` : ''; let optionsHtml = q.options.map((opt, idx) => `<button onclick="window.ansChoice(${idx})" ${state.isAnswered ? 'disabled' : ''} class="w-full p-4 mb-3 text-left border-2 rounded-xl transition font-medium border-slate-100 hover:bg-slate-50">${opt}</button>`).join(''); contentHtml = extraHtml + optionsHtml; } else if (q.type === 'order') { const { pool, answer } = state.tempAnswer; let ansH = answer.map((w,i)=>`<span onclick="window.moveOrder(${i},'back')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg font-bold m-1 order-tag">${w.text}</span>`).join(''); let poolH = pool.map((w,i)=>`<span onclick="window.moveOrder(${i},'to')" class="bg-white border border-slate-300 px-3 py-1 rounded-lg m-1 order-tag shadow-sm">${w.text}</span>`).join(''); contentHtml = `<div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed mb-4 flex flex-wrap min-h-[60px]">${ansH}</div><div class="flex flex-wrap justify-center">${poolH}</div>`; canSubmit = !state.isAnswered && pool.length === 0; } else if (q.type === 'fill-gap') { const { parts, userInputs } = state.tempAnswer; let html = ''; parts.forEach((p, i) => { html += `<span>${p}</span>`; if (i < userInputs.length) { html += `<input class="border-b-2 border-indigo-300 px-1 mx-1 w-32 text-center focus:outline-none focus:border-indigo-600 bg-transparent text-indigo-700 font-bold" value="${userInputs[i]}" oninput="window.fillGap(${i}, this.value)" ${state.isAnswered?'disabled':''}>`; } }); contentHtml = `<div class="leading-loose text-lg">${html}</div>`; canSubmit = !state.isAnswered && userInputs.every(v => v.length > 0); } c.innerHTML = `<div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden fade-in"><div class="h-2 bg-slate-100"><div class="h-full bg-indigo-500 transition-all duration-300" style="width:${prog}%"></div></div><div class="p-8"><div class="flex justify-between mb-6 text-sm"><span class="font-bold text-slate-500">${state.studentName}</span><span class="text-indigo-600 font-bold">Q. ${state.qIndex+1}/${state.quizData.length}</span></div><h2 class="text-xl font-bold mb-6 text-slate-800">${q.q}</h2>${contentHtml}<div class="mt-8"><button id="submit-btn" onclick="window.check()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-md disabled:opacity-50" ${canSubmit ? '' : 'disabled'}>Guardar Respuesta</button></div></div></div>`; }
        window.updateTextState = (val) => { state.tempAnswer = val; const btn = document.getElementById('submit-btn'); if(btn) btn.disabled = val.trim().length === 0; }; 
        window.fillGap = (idx, val) => { state.tempAnswer.userInputs[idx] = val; const btn = document.getElementById('submit-btn'); if(btn) btn.disabled = !state.tempAnswer.userInputs.every(v => v.length > 0); }; 
        window.grpClickItem = (idx) => { if(state.isAnswered) return; if(state.tempAnswer[idx].currentGroup !== null) { state.tempAnswer[idx].currentGroup = null; state.selectedGroupingItem = null; } else { state.selectedGroupingItem = (state.selectedGroupingItem === idx) ? null : idx; } render(); }; window.grpClickGroup = (gIdx) => { if(state.isAnswered || state.selectedGroupingItem === null) return; state.tempAnswer[state.selectedGroupingItem].currentGroup = gIdx; state.selectedGroupingItem = null; render(); }; window.ansChoice = (idx) => { state.tempAnswer = idx; state.isAnswered = true; check(); }; window.matchLeft = (i) => { if(state.isAnswered)return; state.tempAnswer.leftSelected = i; render(); }; window.matchRight = (i) => { if(state.isAnswered||state.tempAnswer.leftSelected===null)return; state.tempAnswer.matches[state.tempAnswer.leftSelected]=i; state.tempAnswer.leftSelected=null; render(); }; window.moveOrder = (i, dir) => { if(state.isAnswered)return; const {pool,answer}=state.tempAnswer; if(dir==='to') answer.push(pool.splice(i,1)[0]); else pool.push(answer.splice(i,1)[0]); render(); };
        window.check = () => { const q = state.quizData[state.qIndex]; state.isAnswered = true; let isCorrect = false; if (q.type === 'text') isCorrect = normalizeText(state.tempAnswer) === normalizeText(q.correct); if (q.type === 'matching') isCorrect = Object.entries(state.tempAnswer.matches).every(([l,r]) => parseInt(l)===parseInt(r)); if (q.type === 'order') isCorrect = state.tempAnswer.answer.map(a=>a.text).join(' ') === q.items.join(' '); if (q.type === 'fill-gap') isCorrect = state.tempAnswer.userInputs.every((v,i) => normalizeText(v) === normalizeText(state.tempAnswer.correctAnswers[i])); if (q.type === 'grouping') isCorrect = state.tempAnswer.every(i => i.currentGroup === i.group); if (q.type === 'choice' || q.type === 'reading') isCorrect = state.tempAnswer === q.correct; if (isCorrect) state.score++; state.detailedAnswers[q.id] = { type: q.type, val: state.tempAnswer, correct: isCorrect }; saveState(); setTimeout(() => { window.next(); }, 600); };
        async function finishQuiz() { state.view = 'finished'; render(); saveState(); if (state.mode === 'cloud') { try { await addDoc(getColRef('resultados_quiz'), { studentName: state.studentName, studentKey: state.studentKey, score: state.score, totalQuestions: state.quizData.length, timestamp: new Date().toISOString(), warnings: state.warnings, answers: JSON.stringify(state.detailedAnswers) }); } catch(e){} } }
        function renderFinished(c) { const n = ((state.score / state.quizData.length) * 10).toFixed(1); c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full"><i class="ph ph-check-circle text-green-500 text-6xl mb-4"></i><h2 class="text-2xl font-bold mb-2">¡Finalizado!</h2><p class="text-slate-500 mb-6">Gracias ${state.studentName}.</p><div class="text-5xl font-black text-slate-800 mb-2">${n}</div><p class="text-sm text-slate-400 mb-6 uppercase">Calificación</p><button onclick="location.reload()" class="bg-slate-800 text-white px-6 py-4 rounded-xl w-full">Salir</button></div>`; }
        function renderAdminLogin(c) { c.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center"><h2 class="text-xl font-bold mb-4">Portal Profesor</h2><input type="password" id="ap" placeholder="Contraseña" class="w-full p-4 border-2 rounded-xl mb-4 text-center focus:border-indigo-500 outline-none"><button id="abl" class="bg-slate-800 text-white w-full py-4 rounded-xl font-bold shadow hover:bg-slate-700 transition">Entrar</button></div>`; const attemptLogin = () => { if (document.getElementById('ap').value === PASSWORD_ADMIN) { state.view = 'admin_dashboard'; startAdmin(); render(); } }; document.getElementById('abl').onclick = attemptLogin; }
        function startAdmin() { if (state.mode === 'cloud') { listenToData('resultados_quiz', d => { state.results = d.sort((a,b) => b.score - a.score); if(state.view === 'admin_dashboard') render(); }); listenToData('claves_alumnos', d => { state.studentsList = d.sort((a,b) => a.nombre.localeCompare(b.nombre)); if(state.view === 'admin_dashboard') render(); }); } }
        function renderAdminDashboard(c) { const rows = state.adminTab === 'results' ? state.results.map((r, i) => `<tr class="border-b text-sm"><td class="p-3">${i+1}</td><td class="p-3">${r.studentName}</td><td class="p-3 font-bold">${((r.score/r.totalQuestions)*10).toFixed(1)}</td><td class="p-3 text-center">${r.warnings}</td><td class="p-3 text-right"><button onclick="window.delRes('${r.id}')" class="text-red-500"><i class="ph ph-trash"></i></button></td></tr>`).join('') : state.studentsList.map(s => `<tr class="border-b text-sm"><td class="p-3 font-bold">${s.id}</td><td class="p-3">${s.nombre}</td><td class="p-3 text-right"><button onclick="window.delKey('${s.id}')" class="text-red-500"><i class="ph ph-trash"></i></button></td></tr>`).join(''); c.innerHTML = `<div class="w-full max-w-4xl mt-8"><div class="flex justify-between mb-6"><h2 class="text-2xl font-bold">Dashboard</h2><button onclick="location.reload()">Cerrar</button></div><div class="flex gap-2 mb-4"><button onclick="window.setTab('results')" class="px-4 py-2 border rounded">Resultados</button><button onclick="window.setTab('keys')" class="px-4 py-2 border rounded">Claves</button></div>${state.adminTab === 'keys' ? `<div class="mb-4 flex gap-2"><input id="nk" placeholder="Clave" class="p-2 border rounded"><input id="nn" placeholder="Nombre" class="p-2 border rounded"><button onclick="window.addKey()" class="bg-indigo-600 text-white px-4 rounded">Añadir</button></div>` : ''}<table class="w-full bg-white rounded shadow"><thead><tr class="bg-slate-50"> ${state.adminTab === 'results' ? '<th class="p-3">#</th><th class="p-3">Alumno</th><th class="p-3">Nota</th><th class="p-3">Alertas</th><th></th>' : '<th class="p-3 text-left">Clave</th><th class="p-3 text-left">Nombre</th><th></th>'} </tr></thead><tbody>${rows}</tbody></table></div>`; window.setTab = t => { state.adminTab = t; render(); }; window.delRes = async id => { if(state.mode === 'cloud') await deleteDoc(getDocRef('resultados_quiz', id)); }; window.delKey = async id => await deleteStudentKey(id); window.addKey = async () => { const k=document.getElementById('nk').value, n=document.getElementById('nn').value; if(k&&n) await createStudentKey(k,n); }; }

        init();
    </script>
