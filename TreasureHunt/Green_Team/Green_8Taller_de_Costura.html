<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNID Treasure Hunt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 20px 0;
            text-transform: uppercase;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #e67e22;
        }
        #next-clue {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #34495e;
            border-left: 5px solid #f39c12;
            text-align: left;
        }
        #error-msg {
            color: #e74c3c;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Security Checkpoint</h2>
        <p>Enter the keyword that brought you to this location:</p>
        
        <input type="text" id="passwordInput" placeholder="ENTER PASSWORD">
        <br>
        <button onclick="checkPassword()">Unlock Next Clue</button>
        
        <p id="error-msg">Access Denied. Try again.</p>

<div id="next-clue">
    <h3>Access Granted!</h3>
    <p><strong>Next Destination:</strong></p>
    <p>I have two faces. To one side, I am a reflection; to the other, I am a window. Seek the room named after a German psychologist, where observers watch unseen.</p>
</div>

    <script>
        function checkPassword() {
            // Cambia "BOOKS" por la contraseña correcta de cada estación
            const correctPassword = "STITCH"; 
            const userPassword = document.getElementById("passwordInput").value.trim().toUpperCase();
            
            if (userPassword === correctPassword) {
                document.getElementById("next-clue").style.display = "block";
                document.getElementById("error-msg").style.display = "none";
                document.getElementById("passwordInput").disabled = true;
            } else {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("next-clue").style.display = "none";
            }
        }
    </script>

</body>
</html>
