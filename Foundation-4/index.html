            a, a:visited, a:hover, a:active {

        }

        .card { 
            /* EFECTO DE TRANSPARENCIA (Glassmorphism) */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.2); /* Blanco con 20% de opacidad */

            border-radius: 20px; 
            max-width: 500px; 
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);

            color: #ffffff;
        }

        /* ESTILO DEL LOGO */
        .logo-grupo {
            width: 100px; /* Ajusta el tamaño */
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;

        h2 { 
            margin-top: 0;
            font-size: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 15px;
        }

        ul { list-style: none; padding: 0; margin: 30px 0; }

        li { margin: 15px 0; }

        .btn-material span {
            text-decoration: none;
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: left;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-material:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #ffffff !important
            transform: translateY(-3px);
        }

        .badge {
            font-size: 0.7em;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .html { background: #2ecc71; }
        .pptx { background: #e74c3c; }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9em;
        }
